version: 2

models:
  - name: stg_transactions
    description: "Cleaned staging layer for PaySim transactions"
    columns:
      - name: customer_id
        tests:
          - not_null
      - name: amount
        tests:
          - not_null
      - name: transaction_type
        tests:
          - not_null
          - accepted_values:
              values: ['CASH_IN', 'CASH_OUT', 'DEBIT', 'PAYMENT', 'TRANSFER']